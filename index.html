<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Who Are Ya? - Futebol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f8fafc;--card:#ffffff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--shadow:0 18px 40px rgba(15,23,42,.08);--green:#10b981;--gray:#4b5563;--red:#ef4444;--accent:#0f172a}
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:'Inter',system-ui,sans-serif;background:radial-gradient(circle at top, #ffffff 0%, var(--bg) 55%, #eef2ff 100%);color:var(--text)}
    button,input{font:inherit}
    .app{min-height:100%;display:grid;place-items:center;padding:28px}
    .shell{width:min(980px,100%);display:grid;gap:18px;justify-items:center}
    .top{display:grid;gap:10px;justify-items:center;text-align:center}
    .mystery{width:128px;height:128px;border-radius:32px;display:grid;place-items:center;background:linear-gradient(180deg,#fff, #f8fafc);box-shadow:var(--shadow);border:1px solid rgba(226,232,240,.8);font-size:4.8rem;font-weight:800;color:#94a3b8;user-select:none}
    .title{margin:0;font-size:clamp(1.5rem,2.8vw,2.2rem);letter-spacing:-.03em}
    .subtitle{margin:0;max-width:60ch;color:var(--muted);line-height:1.55}
    .search-wrap{width:min(720px,100%);position:relative}
    .search-row{display:flex;gap:12px;align-items:stretch;width:100%}
    .input-box{position:relative;flex:1}
    .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:1.05rem;pointer-events:none}
    .input{width:100%;padding:18px 18px 18px 46px;border:1px solid var(--border);border-radius:16px;background:var(--card);color:var(--text);box-shadow:0 10px 25px rgba(15,23,42,.06);outline:none;transition:border-color .2s ease, box-shadow .2s ease, transform .2s ease}
    .input::placeholder{color:#94a3b8}
    .input:focus{border-color:rgba(16,185,129,.45);box-shadow:0 0 0 4px rgba(16,185,129,.12), 0 12px 28px rgba(15,23,42,.08)}
    .btn{border:0;border-radius:16px;padding:0 22px;font-weight:700;background:linear-gradient(180deg,#111827,#0f172a);color:#fff;cursor:pointer;box-shadow:0 14px 30px rgba(15,23,42,.18);transition:transform .2s ease, box-shadow .2s ease, opacity .2s ease, background .2s ease}
    .btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 18px 34px rgba(15,23,42,.24)}
    .btn:active:not(:disabled){transform:translateY(0)}
    .btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
    .suggestions{position:absolute;top:calc(100% + 10px);left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 18px 40px rgba(15,23,42,.12);z-index:20;max-height:312px;overflow-y:auto;display:none}
    .suggestions.open{display:block;animation:fadeIn .14s ease-out}
    .item{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;cursor:pointer;border-bottom:1px solid #f1f5f9;transition:background .15s ease, transform .15s ease}
    .item:last-child{border-bottom:0}
    .item:hover,.item.active{background:#f8fafc}
    .item strong{display:block;font-size:.98rem;font-weight:700}
    .item span{color:var(--muted);font-size:.88rem}
    .results{width:min(900px,100%);display:grid;gap:12px;margin-top:6px}
    .result{display:grid;grid-template-columns:minmax(190px,1.3fr) repeat(5,minmax(62px,1fr));gap:10px;align-items:center;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:0 10px 28px rgba(15,23,42,.06);transform-origin:center;animation:rowIn .28s ease-out both}
    .namebox{display:flex;flex-direction:column;gap:4px;padding-left:4px}
    .namebox b{font-size:1rem;letter-spacing:-.02em}
    .namebox small{color:var(--muted)}
    .pill{height:60px;border-radius:16px;display:grid;place-items:center;color:#fff;font-weight:800;line-height:1;text-align:center;padding:8px 10px;min-width:62px;justify-self:center;box-shadow:0 8px 18px rgba(15,23,42,.08);opacity:0;transform:translateY(8px) scale(.96)}
    .pill.show{animation:tileIn .22s ease-out forwards}
    .pill .label{display:block;font-size:.66rem;opacity:.92;letter-spacing:.08em}
    .pill .value{display:block;font-size:.92rem;margin-top:3px}
    .green{background:linear-gradient(180deg,#34d399,var(--green))}
    .gray{background:linear-gradient(180deg,#6b7280,var(--gray))}
    .red{background:linear-gradient(180deg,#f87171,var(--red))}
    .message{min-height:28px;font-weight:700;text-align:center;color:#0f172a}
    .hint{color:var(--muted);font-size:.92rem;text-align:center}
